PKG_NAME="nmap"
PKG_VERSION="7.97"
# nmap patches are applied to installed files, not source build
# BUILD_TYPE=special means pkg_build() is a no-op; the apply.sh handles everything
BUILD_TYPE="special"
PKG_URL=""     # no download needed; install via: apt install nmap
PKG_SRCDIR=""  # no source tree

pkg_build() {
    # nmap is installed via apt; patches are applied post-install by apply.sh
    echo "[nmap] Nothing to build — patches applied to installed files by apply.sh"
}

INSTALL_BINS=()   # already installed by apt
INSTALL_DIR=""
