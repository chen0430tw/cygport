PKG_NAME="john"
PKG_VERSION="bleeding-jumbo"
PKG_URL="https://github.com/openwall/john/archive/bleeding-jumbo.tar.gz"
PKG_SRCDIR="john-bleeding-jumbo"

BUILD_TYPE="special"

INSTALL_BINS=()
INSTALL_DIR="/usr/local/share/john"

pkg_build() {
    cd src
    # configure 不带 npcap/OpenCL 路径，避免干扰标准头文件检测
    LDFLAGS='-L/usr/local/lib' ./configure
    # make 时再加 npcap/OpenCL 头文件路径
    make -j"${JOBS:-4}" CPPFLAGS='-I/usr/local/include'
}

pkg_install() {
    local dst="/usr/local/share/john"
    mkdir -p "$dst"

    # run/ 目录包含 john.exe、所有 *2john 工具、字典、规则、配置
    cp -r run/. "$dst/"

    # wrapper：从安装目录执行，确保相对路径（john.conf 等）正确
    for tool in john rar2john zip2john gpg2john keepass2john \
                wpapcap2john bitlocker2john dmg2john putty2john \
                SIPdump vncpcap2john eapmd5tojohn \
                unshadow unique unafs undrop base64conv; do
        local exe="$dst/${tool}.exe"
        [ -f "$exe" ] || continue
        cat > "/usr/local/bin/${tool}" << WRAPPER
#!/bin/bash
cd /usr/local/share/john
exec ./${tool}.exe "\$@"
WRAPPER
        chmod 755 "/usr/local/bin/${tool}"
    done

    echo "[john] installed to $dst"
    echo "[john] run via: john --list=build-info"
}
