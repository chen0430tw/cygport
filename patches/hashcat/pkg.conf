PKG_NAME="hashcat"
PKG_VERSION="7.1.2"
PKG_URL="https://github.com/hashcat/hashcat/archive/refs/tags/v7.1.2.tar.gz"
PKG_SRCDIR="hashcat-7.1.2"

BUILD_TYPE="special"

INSTALL_BINS=()
INSTALL_DIR="/usr/local/share/hashcat"

pkg_build() {
    CFLAGS='-ffat-lto-objects' LDFLAGS='-ffat-lto-objects' \
        make ENABLE_LTO=1 -j"${JOBS:-4}" hashcat.exe

    # 顺便编 unrar 独立二进制（与 hashcat module API 版本锁定）
    (cd deps/unrar && make CXX=g++ CXXFLAGS='-O2' LIBFLAGS='' \
        DEFINES='-D_FILE_OFFSET_BITS=64 -D_LARGEFILE_SOURCE -DRAR_SMP' \
        LDFLAGS='-pthread' STRIP=strip)
}

pkg_install() {
    local dst="/usr/local/share/hashcat"
    mkdir -p "$dst"

    # 主程序
    install -m 755 hashcat.exe "$dst/hashcat.exe"

    # 必需的资源目录（OpenCL kernel 路径相对于 CWD，必须放一起）
    cp -r OpenCL hashcat.hcstat2 "$dst/"
    [ -d modules ] && cp -r modules "$dst/"
    [ -d kernels ] && cp -r kernels "$dst/"

    # 可选资源
    for d in rules masks charsets layouts tunings; do
        [ -d "$d" ] && cp -r "$d" "$dst/"
    done

    # unrar 独立二进制
    install -m 755 deps/unrar/unrar /usr/local/bin/unrar

    # wrapper script：cd 到安装目录再执行，让 OpenCL 相对路径生效
    cat > /usr/local/bin/hashcat << 'WRAPPER'
#!/bin/bash
cd /usr/local/share/hashcat
exec ./hashcat.exe "$@"
WRAPPER
    chmod 755 /usr/local/bin/hashcat

    echo "[hashcat] installed to $dst"
    echo "[hashcat] run via: hashcat --version"
}
