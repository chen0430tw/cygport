PKG_NAME="pcaprub"
PKG_VERSION="0.13.3"
PKG_URL="https://rubygems.org/downloads/pcaprub-0.13.3.gem"
PKG_SRCDIR="pcaprub-0.13.3"

# .gem files need gem unpack instead of tar
PKG_EXTRACT_CMD="gem unpack --target=/tmp/cygport-work"

# pcaprub is a Ruby C extension: extconf.rb → make
BUILD_TYPE="special"

INSTALL_BINS=("pcaprub_c.so")
INSTALL_DIR="$(ruby -e 'puts RbConfig::CONFIG["vendorarchdir"]')"

pkg_build() {
    cd ext/pcaprub_c
    ruby extconf.rb --with-pcap-dir=/opt/cygwin-port
    make
}
